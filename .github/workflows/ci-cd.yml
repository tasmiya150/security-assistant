name: Security Assistant CI/CD

on:
  push:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        run: docker build ./app -t backend

      - name: Build frontend
        run: docker build ./frontend -t frontend