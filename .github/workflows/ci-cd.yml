name: Security Assistant CI/CD

on:
  push:
    branches: [main]

jobs:

  frontend:
    name: Frontend test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Lint Streamlit app
        run: python -m py_compile app/main.py && echo "Streamlit OK"

  backend:
    name: Backend test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/test_unit.py -v --tb=short

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t security-assistant .

  e2e-selenium:
    name: E2E Selenium
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Start app with Docker
        run: |
          docker compose up -d
          sleep 25
      - name: Wait for API health
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health && break
            sleep 3
          done
      - name: Run Selenium E2E tests
        run: pytest tests/test_selenium.py -v --tb=short
      - name: Tear down
        if: always()
        run: docker compose down